<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DreamCanvas AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #07090f;
            --surface: #0e1117;
            --border: rgba(255,255,255,0.07);
            --accent: #5b6ef5;
            --accent-glow: rgba(91, 110, 245, 0.35);
            --text: #e8eaf0;
            --muted: #6b7280;
            --error: #f87171;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px 80px;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(91,110,245,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(91,110,245,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(91,110,245,0.12) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 680px;
        }

        header {
            text-align: center;
            margin-bottom: 48px;
            animation: fadeUp 0.6s ease both;
        }

        .badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
            background: rgba(91,110,245,0.1);
            border: 1px solid rgba(91,110,245,0.25);
            padding: 5px 14px;
            border-radius: 100px;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(40px, 8vw, 64px);
            font-weight: 800;
            line-height: 1.05;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 30%, rgba(255,255,255,0.55));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 14px;
        }

        .subtitle {
            font-size: 16px;
            color: var(--muted);
            font-weight: 300;
            line-height: 1.6;
        }

        .input-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 28px;
            animation: fadeUp 0.6s 0.1s ease both;
            transition: border-color 0.3s;
        }

        .input-card:focus-within {
            border-color: rgba(91,110,245,0.4);
            box-shadow: 0 0 0 4px rgba(91,110,245,0.06);
        }

        .input-label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 10px;
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            line-height: 1.6;
            resize: none;
            min-height: 80px;
        }

        textarea::placeholder {
            color: var(--muted);
        }

        .input-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        #char-count {
            font-size: 12px;
            color: var(--muted);
        }

        #char-count.warn {
            color: var(--error);
        }

        button#generate-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 12px 22px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        button#generate-btn:hover:not(:disabled) {
            background: #6b7ef7;
            transform: translateY(-1px);
            box-shadow: 0 6px 28px var(--accent-glow);
        }

        button#generate-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        #status {
            display: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 14px;
            margin-bottom: 24px;
        }

        #status.loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(91,110,245,0.08);
            border: 1px solid rgba(91,110,245,0.2);
            color: #a5b4fc;
        }

        #status.error {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(248,113,113,0.08);
            border: 1px solid rgba(248,113,113,0.2);
            color: var(--error);
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(165,180,252,0.3);
            border-top-color: #a5b4fc;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }

        #result-container {
            display: none;
            animation: fadeUp 0.5s ease both;
        }

        .result-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .result-label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
        }

        #download-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 7px 13px;
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        #download-btn:hover {
            border-color: rgba(255,255,255,0.15);
            color: var(--text);
        }

        #result-img {
            width: 100%;
            border-radius: 16px;
            border: 1px solid var(--border);
            display: block;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .prompt-echo {
            margin-top: 14px;
            font-size: 13px;
            color: var(--muted);
            line-height: 1.5;
            font-style: italic;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        svg { display: inline-block; vertical-align: middle; }
    </style>
</head>



<body>
    <nav style="position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;padding:20px 40px;border-bottom:1px solid rgba(255,255,255,0.07);margin-bottom:0">
      <span style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:#e8eaf0">DreamCanvas</span>
      <div style="display:flex;gap:12px;align-items:center;font-size:14px">
        {% if current_user.is_authenticated %}
          <a href="{{ url_for('gallery') }}" style="color:#6b7280;text-decoration:none">Gallery</a>
          <span style="color:#6b7280">Hi, {{ current_user.username }}</span>
          <a href="{{ url_for('logout') }}" style="background:#5b6ef5;color:#fff;padding:8px 16px;border-radius:8px;text-decoration:none;font-weight:500">Logout</a>
        {% else %}
          <a href="{{ url_for('login') }}" style="color:#6b7280;text-decoration:none">Login</a>
          <a href="{{ url_for('register') }}" style="background:#5b6ef5;color:#fff;padding:8px 16px;border-radius:8px;text-decoration:none;font-weight:500">Register</a>
        {% endif %}
      </div>
    </nav>
    <div class="container">        

        <header>
            <div class="badge">✦ AI Image Generator</div>
            <h1>DreamCanvas</h1>
            <p class="subtitle">Turn any idea into a stunning image with Stable Diffusion XL</p>
        </header>

        <div class="input-card">
            <div class="input-label">Your Prompt</div>
            <textarea
                id="prompt"
                placeholder="A futuristic city skyline at sunset with neon lights reflecting on the water, cinematic, 4k..."
                maxlength="1000"
                oninput="updateCharCount()"
            ></textarea>
            <div class="input-footer">
                <span id="char-count">0 / 1000</span>
                <button id="generate-btn" onclick="generate()">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                    </svg>
                    Generate
                </button>
            </div>
        </div>

        <div id="status"></div>

        <div id="result-container">
            <div class="result-header">
                <span class="result-label">Generated Image</span>
                <button id="download-btn" onclick="downloadImage()">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    Download
                </button>
            </div>
            <img id="result-img" alt="Generated image" />
            <p class="prompt-echo" id="prompt-echo"></p>
        </div>

    </div>

    <script>
        let currentImageUrl = null;

        function updateCharCount() {
            const prompt = document.getElementById("prompt");
            const counter = document.getElementById("char-count");
            const len = prompt.value.length;
            counter.textContent = `${len} / 1000`;
            counter.classList.toggle("warn", len > 900);
        }

        function setStatus(type, message) {
            const el = document.getElementById("status");
            el.className = type;

            if (type === "loading") {
                el.innerHTML = `<div class="spinner"></div><span>${message}</span>`;
                el.style.display = "flex";
            } else if (type === "error") {
                el.innerHTML = `
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    <span>${message}</span>`;
                el.style.display = "flex";
            } else {
                el.style.display = "none";
            }
        }

        async function generate() {
            const promptEl = document.getElementById("prompt");
            const prompt = promptEl.value.trim();
            const btn = document.getElementById("generate-btn");
            const resultContainer = document.getElementById("result-container");

            if (!prompt) {
                setStatus("error", "Please enter a prompt first.");
                return;
            }

            resultContainer.style.display = "none";
            currentImageUrl = null;
            btn.disabled = true;
            setStatus("loading", "Generating your image — this may take 30–60 seconds…");

            try {
                const res = await fetch("/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt })
                });

                const data = await res.json();

                if (!res.ok || data.error) {
                    setStatus("error", data.error || "Image generation failed. Please try again.");
                    return;
                }

                if (data.image_url) {
                    const img = document.getElementById("result-img");
                    const echoEl = document.getElementById("prompt-echo");

                    currentImageUrl = data.image_url + "?t=" + Date.now();
                    img.src = currentImageUrl;
                    echoEl.textContent = `"${prompt}"`;

                    setStatus("", "");
                    resultContainer.style.display = "block";
                    resultContainer.scrollIntoView({ behavior: "smooth", block: "start" });
                }

            } catch (err) {
                console.error(err);
                setStatus("error", "Could not reach the server. Is Flask running?");
            } finally {
                btn.disabled = false;
            }
        }

        function downloadImage() {
            if (!currentImageUrl) return;
            const a = document.createElement("a");
            a.href = currentImageUrl;
            a.download = `dreamcanvas-${Date.now()}.png`;
            a.click();
        }

        document.getElementById("prompt").addEventListener("keydown", (e) => {
            if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) generate();
        });
    </script>

</body>
</html>
