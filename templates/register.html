<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — DreamCanvas</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#07090f;--surface:#0e1117;--border:rgba(255,255,255,0.07);--accent:#5b6ef5;--text:#e8eaf0;--muted:#6b7280;--error:#f87171;--success:#4ade80}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:400px}
    h1{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;margin-bottom:8px}
    .subtitle{color:var(--muted);font-size:14px;margin-bottom:32px}
    .field{margin-bottom:20px}
    label{display:block;font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
    input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s}
    input:focus{border-color:rgba(91,110,245,0.5)}
    .btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:13px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:background 0.2s}
    .btn:hover{background:#6b7ef7}
    .flash{padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:20px}
    .flash.error{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.2);color:var(--error)}
    .flash.success{background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.2);color:var(--success)}
    .bottom{text-align:center;margin-top:24px;font-size:14px;color:var(--muted)}
    .bottom a{color:var(--accent);text-decoration:none}
  </style>
</head>
<body>
  <div class="card">
    <h1>Create Account</h1>
    <p class="subtitle">Join on DreamCanvas </p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" placeholder="Choose a unique username" required/>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" name="email" placeholder="Your email address" required/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="strong password" required/>
      </div>
      <button class="btn" type="submit">Register</button>
    </form>

    <div class="bottom">
      Do you already have an account? <a href="{{ url_for('login') }}">Login here</a>
    </div>
  </div>
</body>
</html>
